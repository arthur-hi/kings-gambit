<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kings Gambit</title>
  <meta name="description" content="A bold, playful drinking game companion.">
  <link rel="stylesheet" href="css/styles.css?v=1.1">
</head>

<body>

  <!-- Header -->
  <header class="app-header">
    <h1 class="app-title">Kings Gambit</h1>
    <button id="edit-btn" class="edit-btn">Edit</button>
  </header>

  <!-- Player Roster -->
  <main>
    <section class="roster-container">
      <div id="roster" class="roster-grid">
        <!-- Player avatars generated dynamically here -->
      </div>

      <p id="drag-hint" class="drag-hint"
        style="display:none; text-align:center; color:var(--color-text-muted); font-size: 0.9rem; margin-top: 16px;">
        drag to match your table seating,<br>tap
        to toggle who's playing.</p>
    </section>

    <!-- Games List -->
    <section class="games-container">
      <h2 class="mb-4">Select a Game</h2>

      <!-- Example Game Card -->
      <a href="example-game.html" id="game-handshake" class="game-card is-locked">
        <h3 class="game-card-title">The Handshake</h3>
        <p class="game-card-desc">Who drinks? Let fate decide.</p>
      </a>

      <!-- Ring of Fire Game Card -->
      <a href="ring-of-fire.html" id="game-ring-of-fire" class="game-card is-locked">
        <h3 class="game-card-title">Ring of Fire</h3>
        <p class="game-card-desc">Classic circle format. Draw a card!</p>
      </a>

      <!-- Mutiny Game Card -->
      <a href="mutiny.html" id="game-mutiny" class="game-card is-locked">
        <h3 class="game-card-title">Mutiny</h3>
        <p class="game-card-desc">Spin the coin for drinking prompts.</p>
      </a>
    </section>
  </main>

  <!-- Add Player Drawer -->
  <div id="drawer-overlay" class="drawer-overlay"></div>
  <div id="add-player-drawer" class="drawer">
    <div class="drawer-header">
      <h2>New Player</h2>
      <button id="drawer-close" class="drawer-close">✕</button>
    </div>

    <div class="input-group">
      <label class="input-label" for="player-name">Name</label>
      <input type="text" id="player-name" class="input-text" placeholder="Enter name" autocomplete="off" maxlength="12">
      <div class="emoji-selector">
        <label>Pick an Avatar:</label>
        <div id="pack-tabs" class="pack-tabs mb-2"></div>
        <div id="emoji-grid" class="emoji-grid mt-2">
          <!-- Populated via js -->
        </div>
      </div>
      <button id="save-player-btn" class="btn-3d btn-primary">Add Player</button>
    </div>
  </div>

  <script src="js/storage.js?v=1.1"></script>
  <script src="js/app.js?v=1.1"></script>
</body>

</html>
